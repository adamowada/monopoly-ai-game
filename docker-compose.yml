services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-monopoly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-monopoly}
      POSTGRES_DB: ${POSTGRES_DB:-monopoly_ai_game}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - monopoly-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - monopoly-local

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      API_ENV: local
      API_HOST: 0.0.0.0
      API_PORT: "8000"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://monopoly:monopoly@postgres:5432/monopoly_ai_game}
      CODEX_HOME: /root/.codex
      CODEX_AI_EXECUTABLE: ${CODEX_AI_EXECUTABLE:-codex}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      # codex-home: mount the host Codex home so live codex exec can read auth and write runtime state.
      - type: bind
        source: "${CODEX_HOST_HOME:-C:/Users/adams/.codex}"
        target: /root/.codex
        bind:
          create_host_path: false
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - monopoly-local

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      HOSTNAME: 0.0.0.0
      PORT: "3000"
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://api:8000}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - monopoly-local

networks:
  monopoly-local:
    driver: bridge

volumes:
  monopoly-postgres-data:
